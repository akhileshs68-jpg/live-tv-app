<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Free TV India">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Watch free live TV channels from India">
    <title>Free TV India - Live TV Streaming</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            position: fixed;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b6b, #ff9e64);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 6px;
            font-size: 18px;
        }

        /* Category Filter */
        .category-filter {
            background: #0a0a0a;
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            flex-shrink: 0;
            border-bottom: 1px solid #222;
            scrollbar-width: none;
        }

        .category-filter::-webkit-scrollbar {
            display: none;
        }

        .category-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid transparent;
            color: #ccc;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            flex-shrink: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        .category-btn:active {
            background: rgba(255, 107, 107, 0.3);
            border-color: #ff6b6b;
            color: #ff6b6b;
            transform: scale(0.95);
        }

        .category-btn.active {
            background: linear-gradient(135deg, #ff6b6b, #ff9e64);
            border-color: #ff6b6b;
            color: #fff;
        }

        /* Search Bar */
        .search-container {
            padding: 12px 16px;
            background: #0a0a0a;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #ff6b6b;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* Main Container */
        .container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        .container::-webkit-scrollbar {
            width: 4px;
        }

        .container::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        .container::-webkit-scrollbar-thumb {
            background: rgba(255, 107, 107, 0.3);
            border-radius: 2px;
        }

        /* Channel Grid */
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            padding: 16px;
            background: #000;
        }

        .channel-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            border: 1px solid #222;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 200px;
            position: relative;
        }

        .channel-card:active {
            transform: scale(0.95);
            border-color: #ff6b6b;
        }

        .channel-thumbnail {
            width: 100%;
            height: 120px;
            background: linear-gradient(135deg, #333 0%, #1a1a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            position: relative;
            overflow: hidden;
        }

        .channel-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-icon {
            position: absolute;
            width: 48px;
            height: 48px;
            background: rgba(255, 107, 107, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            opacity: 0;
            transition: all 0.3s ease;
            cursor: pointer;
            z-index: 10;
        }

        .channel-card:active .play-icon {
            opacity: 1;
        }

        .channel-info {
            padding: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .channel-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
        }

        .channel-category {
            font-size: 12px;
            color: #ff6b6b;
            font-weight: 500;
            margin-top: 4px;
        }

        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 300px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 107, 107, 0.2);
            border-top-color: #ff6b6b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 300px;
            text-align: center;
            color: #666;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Video Player Modal */
        .player-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            flex-direction: column;
            overflow: hidden;
        }

        .player-modal.active {
            display: flex;
        }

        .player-header {
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #222;
            z-index: 1001;
        }

        .player-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .close-btn {
            width: 36px;
            height: 36px;
            background: rgba(255, 107, 107, 0.1);
            border: none;
            border-radius: 6px;
            color: #ff6b6b;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .close-btn:active {
            background: rgba(255, 107, 107, 0.2);
            transform: scale(0.9);
        }

        .video-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        .video-player {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 0;
        }

        .player-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
        }

        .player-error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #ff6b6b;
            font-size: 14px;
            display: none;
            z-index: 500;
        }

        .player-error.show {
            display: block;
        }

        .player-controls {
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #222;
            z-index: 1001;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-btn {
            width: 36px;
            height: 36px;
            background: rgba(255, 107, 107, 0.1);
            border: none;
            border-radius: 6px;
            color: #ff6b6b;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .volume-btn:active {
            background: rgba(255, 107, 107, 0.2);
            transform: scale(0.9);
        }

        .fullscreen-btn {
            width: 36px;
            height: 36px;
            background: rgba(255, 107, 107, 0.1);
            border: none;
            border-radius: 6px;
            color: #ff6b6b;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            margin-left: auto;
        }

        .fullscreen-btn:active {
            background: rgba(255, 107, 107, 0.2);
            transform: scale(0.9);
        }

        /* Fullscreen */
        .player-modal.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        @supports (padding: max(0px)) {
            .header, .player-header {
                padding-top: max(12px, env(safe-area-inset-top));
                padding-left: max(16px, env(safe-area-inset-left));
                padding-right: max(16px, env(safe-area-inset-right));
            }

            .player-controls {
                padding-bottom: max(12px, env(safe-area-inset-bottom));
            }
        }

        /* Orientation Lock */
        @media (orientation: landscape) {
            body {
                transform: rotate(90deg);
                transform-origin: center;
                width: 100vh;
                height: 100vw;
            }
        }

        /* Responsive Grid */
        @media (min-width: 480px) {
            .channels-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 14px;
                padding: 18px;
            }
        }

        @media (min-width: 768px) {
            .channels-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 16px;
            }
        }

        /* Touch Feedback */
        .touch-feedback {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1>📺 Free TV India</h1>
        <div class="header-icon">🔴</div>
    </header>

    <!-- Category Filter -->
    <div class="category-filter" id="categoryFilter">
        <button class="category-btn active" data-category="all">All</button>
        <button class="category-btn" data-category="news">News</button>
        <button class="category-btn" data-category="sports">Sports</button>
        <button class="category-btn" data-category="movies">Movies</button>
        <button class="category-btn" data-category="kids">Kids</button>
        <button class="category-btn" data-category="entertainment">Entertainment</button>
    </div>

    <!-- Search -->
    <div class="search-container">
        <input type="text" class="search-input" id="searchInput" placeholder="Search channels..." autocomplete="off">
    </div>

    <!-- Main Container -->
    <div class="container" id="container">
        <div class="channels-grid" id="channelsGrid">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <!-- Video Player Modal -->
    <div class="player-modal" id="playerModal">
        <div class="player-header">
            <span class="player-title" id="playerTitle">Loading...</span>
            <button class="close-btn" id="closePlayerBtn">✕</button>
        </div>

        <div class="video-container">
            <video class="video-player" id="videoPlayer" controls playsinline crossorigin="anonymous"></video>
            <div class="player-loading" id="playerLoading">
                <div class="spinner"></div>
            </div>
            <div class="player-error" id="playerError">
                <div>Stream unavailable</div>
                <div style="font-size: 12px; margin-top: 8px;">This channel may be offline or the stream is restricted.</div>
            </div>
        </div>

        <div class="player-controls">
            <div class="volume-control">
                <button class="volume-btn" id="volumeBtn">🔊</button>
            </div>
            <button class="fullscreen-btn" id="fullscreenBtn">⛶</button>
        </div>
    </div>

    <script>
        // ============== Configuration ==============
        const CONFIG = {
            M3U_URL: 'https://iptv-org.github.io/iptv/countries/in.m3u',
            CACHE_KEY: 'tv_channels_cache',
            CACHE_DURATION: 24 * 60 * 60 * 1000, // 24 hours
            DEFAULT_LOGO: '📺'
        };

        // ============== State ==============
        let state = {
            channels: [],
            filteredChannels: [],
            currentCategory: 'all',
            searchQuery: '',
            selectedChannel: null
        };

        // ============== Disable Zoom ==============
        function disableZoom() {
            // Prevent pinch zoom
            document.addEventListener('touchmove', (e) => {
                if (e.touches.length > 1) {
                    e.preventDefault();
                }
            }, { passive: false });

            // Prevent double-tap zoom
            let lastTouchEnd = 0;
            document.addEventListener('touchend', (e) => {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) {
                    e.preventDefault();
                }
                lastTouchEnd = now;
            }, false);

            // Prevent gesture zoom
            document.addEventListener('gesturestart', (e) => {
                e.preventDefault();
            }, false);

            // Prevent keyboard zoom
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && (e.key === '+' || e.key === '-' || e.key === '0')) {
                    e.preventDefault();
                }
            }, false);
        }

        // ============== Orientation Lock ==============
        function lockOrientation() {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('portrait').catch(err => {
                    console.log('Orientation lock not supported:', err);
                });
            }
        }

        // ============== M3U Parser ==============
        function parseM3U(content) {
            const lines = content.split('\n');
            const channels = [];
            let currentChannel = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();

                if (line.startsWith('#EXTINF:')) {
                    currentChannel = parseExtinf(line);
                } else if (line && !line.startsWith('#') && currentChannel) {
                    currentChannel.url = line;
                    if (shouldIncludeChannel(currentChannel)) {
                        channels.push(currentChannel);
                    }
                    currentChannel = null;
                }
            }

            return channels;
        }

        function parseExtinf(extinf) {
            const channel = {
                name: 'Unknown',
                logo: CONFIG.DEFAULT_LOGO,
                category: 'entertainment',
                url: ''
            };

            // Extract name (last part after comma)
            const parts = extinf.split(',');
            if (parts.length >= 2) {
                channel.name = parts[parts.length - 1].trim();
            }

            // Extract tvg-logo
            const logoMatch = extinf.match(/tvg-logo="([^"]*)"/);
            if (logoMatch && logoMatch[1]) {
                channel.logo = logoMatch[1];
            }

            // Extract group-title (category)
            const categoryMatch = extinf.match(/group-title="([^"]*)"/);
            if (categoryMatch && categoryMatch[1]) {
                channel.category = mapCategory(categoryMatch[1]);
            }

            // Extract tvg-country
            const countryMatch = extinf.match(/tvg-country="([^"]*)"/);
            if (countryMatch) {
                channel.country = countryMatch[1];
            }

            return channel;
        }

        function mapCategory(groupTitle) {
            const title = groupTitle.toLowerCase();
            
            if (title.includes('news')) return 'news';
            if (title.includes('sport')) return 'sports';
            if (title.includes('movie')) return 'movies';
            if (title.includes('kid') || title.includes('children')) return 'kids';
            if (title.includes('music')) return 'entertainment';
            if (title.includes('entertainment')) return 'entertainment';
            
            return 'entertainment';
        }

        function shouldIncludeChannel(channel) {
            // Include channels from India
            if (channel.country && channel.country.includes('IN')) {
                return true;
            }
            // Also include channels with Hindi or India in name
            const name = channel.name.toLowerCase();
            if (name.includes('india') || name.includes('hindi') || name.includes('zee') || name.includes('sony')) {
                return true;
            }
            return false;
        }

        // ============== Data Fetching ==============
        async function fetchChannels() {
            try {
                // Check cache first
                const cached = getCachedChannels();
                if (cached.length > 0) {
                    state.channels = cached;
                    renderChannels();
                    return;
                }

                // Fetch M3U file
                const response = await fetch(CONFIG.M3U_URL);
                if (!response.ok) throw new Error('Failed to fetch M3U');

                const content = await response.text();
                state.channels = parseM3U(content);

                if (state.channels.length === 0) {
                    // Fallback to default channels
                    state.channels = getDefaultChannels();
                }

                // Cache channels
                cacheChannels(state.channels);
                renderChannels();
            } catch (error) {
                console.error('Error fetching channels:', error);
                state.channels = getDefaultChannels();
                renderChannels();
            }
        }

        function getDefaultChannels() {
            return [
                {
                    name: 'DD National',
                    category: 'entertainment',
                    logo: CONFIG.DEFAULT_LOGO,
                    url: 'https://cdnapi.kaltura.com/p/1982821/sp/198282100/playManifest/entryId/0_u1w90qbg/format/applehttp/protocol/https/a.m3u8'
                },
                {
                    name: 'India Today',
                    category: 'news',
                    logo: CONFIG.DEFAULT_LOGO,
                    url: 'https://indiatodaylive.akamaized.net/hls/live/2014320/indiatoday/master.m3u8'
                },
                {
                    name: 'Aaj Tak',
                    category: 'news',
                    logo: CONFIG.DEFAULT_LOGO,
                    url: ''
                },
                {
                    name: 'Cricket Live',
                    category: 'sports',
                    logo: CONFIG.DEFAULT_LOGO,
                    url: ''
                },
                {
                    name: 'Sony TV',
                    category: 'entertainment',
                    logo: CONFIG.DEFAULT_LOGO,
                    url: ''
                },
                {
                    name: 'Star Plus',
                    category: 'entertainment',
                    logo: CONFIG.DEFAULT_LOGO,
                    url: ''
                },
                {
                    name: 'Cartoon Network',
                    category: 'kids',
                    logo: CONFIG.DEFAULT_LOGO,
                    url: ''
                },
                {
                    name: 'Disney Channel',
                    category: 'kids',
                    logo: CONFIG.DEFAULT_LOGO,
                    url: ''
                }
            ];
        }

        function getCachedChannels() {
            try {
                const cached = localStorage.getItem(CONFIG.CACHE_KEY);
                if (cached) {
                    const data = JSON.parse(cached);
                    if (Date.now() - data.timestamp < CONFIG.CACHE_DURATION) {
                        return data.channels;
                    }
                }
            } catch (error) {
                console.error('Cache error:', error);
            }
            return [];
        }

        function cacheChannels(channels) {
            try {
                localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify({
                    channels,
                    timestamp: Date.now()
                }));
            } catch (error) {
                console.error('Cache save error:', error);
            }
        }

        // ============== Filtering & Search ==============
        function filterChannels() {
            state.filteredChannels = state.channels.filter(channel => {
                const matchCategory = state.currentCategory === 'all' || channel.category === state.currentCategory;
                const matchSearch = channel.name.toLowerCase().includes(state.searchQuery.toLowerCase());
                return matchCategory && matchSearch;
            });

            renderChannels();
        }

        function setCategory(category) {
            state.currentCategory = category;
            filterChannels();

            // Update active button
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === category);
            });
        }

        function setSearch(query) {
            state.searchQuery = query;
            filterChannels();
        }

        // ============== UI Rendering ==============
        function renderChannels() {
            const grid = document.getElementById('channelsGrid');

            if (state.filteredChannels.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1;">
                        <div class="empty-state">
                            <div class="empty-icon">📺</div>
                            <div>No channels found</div>
                            <div style="font-size: 12px; margin-top: 8px; color: #555;">Try adjusting your search or filter</div>
                        </div>
                    </div>
                `;
                return;
            }

            grid.innerHTML = state.filteredChannels.map((channel, index) => `
                <div class="channel-card" data-index="${index}">
                    <div class="channel-thumbnail">
                        ${channel.logo && channel.logo !== CONFIG.DEFAULT_LOGO ? 
                            `<img src="${channel.logo}" alt="${channel.name}" onerror="this.style.display='none'">` : 
                            `<div style="font-size: 60px;">${CONFIG.DEFAULT_LOGO}</div>`
                        }
                        <div class="play-icon">▶</div>
                    </div>
                    <div class="channel-info">
                        <div class="channel-name">${escapeHtml(channel.name)}</div>
                        <div class="channel-category">${channel.category.toUpperCase()}</div>
                    </div>
                </div>
            `).join('');

            // Add click listeners
            grid.querySelectorAll('.channel-card').forEach(card => {
                card.addEventListener('click', () => {
                    const index = parseInt(card.dataset.index);
                    openPlayer(state.filteredChannels[index]);
                });
            });
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // ============== Video Player ==============
        function openPlayer(channel) {
            state.selectedChannel = channel;
            document.getElementById('playerModal').classList.add('active');
            document.getElementById('playerTitle').textContent = channel.name;
            document.getElementById('playerError').classList.remove('show');
            document.getElementById('playerLoading').style.display = 'flex';

            const video = document.getElementById('videoPlayer');
            video.src = '';

            if (!channel.url) {
                showPlayerError('Stream URL not available');
                return;
            }

            // Load video
            video.src = channel.url;
            video.play().catch(err => {
                console.error('Playback error:', err);
                showPlayerError('Unable to play stream');
            });
        }

        function closePlayer() {
            const video = document.getElementById('videoPlayer');
            video.pause();
            video.src = '';
            document.getElementById('playerModal').classList.remove('active');
            document.getElementById('playerLoading').style.display = 'none';
        }

        function showPlayerError(message) {
            document.getElementById('playerLoading').style.display = 'none';
            const errorDiv = document.getElementById('playerError');
            errorDiv.querySelector('div').textContent = message;
            errorDiv.classList.add('show');
        }

        // ============== Event Listeners ==============
        function setupEventListeners() {
            // Category filter
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    setCategory(btn.dataset.category);
                });
            });

            // Search
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                setSearch(e.target.value);
            });

            // Player controls
            document.getElementById('closePlayerBtn').addEventListener('click', closePlayer);

            document.getElementById('videoPlayer').addEventListener('play', () => {
                document.getElementById('playerLoading').style.display = 'none';
            });

            document.getElementById('videoPlayer').addEventListener('loadstart', () => {
                document.getElementById('playerLoading').style.display = 'flex';
            });

            document.getElementById('videoPlayer').addEventListener('error', () => {
                showPlayerError('Stream unavailable or blocked');
            });

            // Volume control
            document.getElementById('volumeBtn').addEventListener('click', () => {
                const video = document.getElementById('videoPlayer');
                video.muted = !video.muted;
                document.getElementById('volumeBtn').textContent = video.muted ? '🔇' : '🔊';
            });

            // Fullscreen
            document.getElementById('fullscreenBtn').addEventListener('click', () => {
                const video = document.getElementById('videoPlayer');
                if (video.requestFullscreen) {
                    video.requestFullscreen();
                } else if (video.webkitRequestFullscreen) {
                    video.webkitRequestFullscreen();
                } else if (video.mozRequestFullScreen) {
                    video.mozRequestFullScreen();
                }
            });

            // Close player on escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && document.getElementById('playerModal').classList.contains('active')) {
                    closePlayer();
                }
            });
        }

        // ============== Initialization ==============
        function init() {
            disableZoom();
            lockOrientation();
            setupEventListeners();
            fetchChannels();
        }

        // Start app when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        // Prevent context menu
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });
    </script>
</body>
</html>
